services:
  backend:
    build: ./backend
    container_name: captureos-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=/app/data/captureos.db
      - JWT_SECRET=${JWT_SECRET:-captureos-secret-change-in-production}
      - PORT=8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: captureos-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: captureos-caddy
    restart: unless-stopped
    ports:
      - "3080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
